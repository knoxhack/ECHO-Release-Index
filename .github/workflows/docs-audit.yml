name: Docs Audit

on:
  push:
  pull_request:

jobs:
  docs-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/docs-audit.mjs
      - run: node scripts/validate-index.mjs --strict
      - run: node scripts/verify-content-graph-release-proof.mjs
      - name: Check Codex context when sibling ECHO repos are present
        shell: bash
        run: |
          if [ -d ../ECHO-Modules ] && [ -d ../ECHO-SDK ]; then
            node scripts/generate-codex-context.mjs --check
          else
            echo "Skipping Codex context check because the full ECHO source-root layout is not present."
          fi
      - run: node scripts/sync-public-alpha-index.mjs --check
      - run: node scripts/test-validate-index.mjs
      - run: node scripts/test-verify-content-graph-release-proof.mjs
      - run: node scripts/test-sync-public-alpha-index.mjs
      - run: node scripts/test-verify-artifact-urls.mjs
      - run: node scripts/test-build-public-alpha-assets.mjs
      - run: node scripts/test-publish-public-alpha.mjs
      - run: node scripts/test-ingest-release-local-e2e.mjs
      - run: node scripts/test-publish-ingest-install-local-e2e.mjs
      - run: node scripts/test-ingest-webhook-service.mjs
      - run: node scripts/validate-public-alpha.mjs
      - run: node --check scripts/ingest-release.mjs
      - run: node --check scripts/ingest-webhook-service.mjs
      - run: node --check scripts/import-module-release.mjs
      - run: node --check scripts/public-alpha-common.mjs
      - run: node --check scripts/sync-public-alpha-index.mjs
      - run: node --check scripts/verify-content-graph-release-proof.mjs
      - run: node --check scripts/verify-artifact-urls.mjs
      - run: node --check scripts/test-verify-artifact-urls.mjs
      - run: node --check scripts/build-public-alpha-assets.mjs
      - run: node --check scripts/test-build-public-alpha-assets.mjs
      - run: node --check scripts/publish-public-alpha.mjs
      - run: node --check scripts/test-publish-public-alpha.mjs
      - run: node --check scripts/test-publish-ingest-install-local-e2e.mjs
